{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="glass-card mt-5 p-5">
            <h2 class="text-center mb-4" style="color: var(--trust-blue);">Welcome Back</h2>
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted-custom">Email address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted-custom">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 mb-3">Log In</button>
            </form>
            <div class="text-center">
                <small class="text-muted-custom">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--trust-blue);">Register</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
